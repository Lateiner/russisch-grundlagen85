<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspekt-Memory: Verben verschwinden</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f0f4f8;
            --card-back: #34495e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .instructions {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 0.9rem;
            text-align: center;
        }

        /* Memory Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        /* Card Container */
        .memory-card {
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s, opacity 0.6s ease-out, visibility 0.6s;
            cursor: pointer;
        }

        /* Umdrehen */
        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        /* Verschwinden bei Match */
        .memory-card.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 0.85rem;
            font-weight: bold;
            padding: 5px;
            text-align: center;
            border: 2px solid white;
        }

        .card-front {
            background-color: white;
            color: var(--primary-color);
            transform: rotateY(180deg);
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            font-size: 1.2rem;
        }

        /* Lösung-Farben für Paare (werden per JS zugewiesen) */
        .pair-color-1 { background-color: #FFADAD !important; color: #000; }
        .pair-color-2 { background-color: #FFD6A5 !important; color: #000; }
        .pair-color-3 { background-color: #FDFFB6 !important; color: #000; }
        .pair-color-4 { background-color: #CAFFBF !important; color: #000; }
        .pair-color-5 { background-color: #9BF6FF !important; color: #000; }
        .pair-color-6 { background-color: #A0C4FF !important; color: #000; }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
        }

        .btn-solution { background-color: #34495e; }
        .btn-reset { background-color: #95a5a6; }

        @media (max-width: 400px) {
            .memory-grid { grid-template-columns: repeat(2, 1fr); }
            .memory-card { height: 70px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Aspekt-Memory</h1>
    
    <div class="instructions">
        Finde die Paare (unvollendet / vollendet). Korrekte Paare verschwinden vom Feld.
    </div>

    <div class="memory-grid" id="grid"></div>

    <div class="controls">
        <button class="btn-solution" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn-reset" onclick="resetGame()">Neustart</button>
    </div>
</div>

<script>
    const pairs = [
        { uv: "ЯВЛЯТЬСЯ", v: "ЯВИТЬСЯ", id: 1 },
        { uv: "ПОЯВЛЯТЬСЯ", v: "ПОЯВИТЬСЯ", id: 2 },
        { uv: "ПРОЯВЛЯТЬ", v: "ПРОЯВИТЬ", id: 3 },
        { uv: "ПРОЯВЛЯТЬСЯ", v: "ПРОЯВИТЬСЯ", id: 4 },
        { uv: "ИСЧЕЗАТЬ", v: "ИСЧЕЗНУТЬ", id: 5 },
        { uv: "ПРИБЫВАТЬ", v: "ПРИБЫТЬ", id: 6 }
    ];

    let flippedCards = [];
    let lockBoard = false;

    function createBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        flippedCards = [];
        lockBoard = false;
        
        const cardData = [];
        pairs.forEach(p => {
            cardData.push({ text: p.uv, pairId: p.id });
            cardData.push({ text: p.v, pairId: p.id });
        });

        // Mischen
        cardData.sort(() => Math.random() - 0.5);

        cardData.forEach(data => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.pairId = data.pairId;
            
            card.innerHTML = `
                <div class="card-face card-back">?</div>
                <div class="card-face card-front">${data.text}</div>
            `;
            
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (lockBoard || card.classList.contains('flipped') || card.classList.contains('hidden')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.pairId === card2.dataset.pairId;

        if (isMatch) {
            lockBoard = true;
            // Kurz warten, damit man das zweite Wort noch sieht, dann verschwinden lassen
            setTimeout(() => {
                card1.classList.add('hidden');
                card2.classList.add('hidden');
                resetFlipping();
            }, 800);
        } else {
            lockBoard = true;
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                resetFlipping();
            }, 1200);
        }
    }

    function resetFlipping() {
        flippedCards = [];
        lockBoard = false;
    }

    function showSolution() {
        // Alle Karten umdrehen, sichtbar machen und einfärben
        const allCards = document.querySelectorAll('.memory-card');
        allCards.forEach(card => {
            const pairId = card.dataset.pairId;
            const frontFace = card.querySelector('.card-front');
            
            card.classList.remove('hidden'); // Falls sie schon weg waren
            card.classList.add('flipped');
            
            // Jedem Paar eine eigene Klasse geben
            frontFace.className = 'card-face card-front pair-color-' + pairId;
            
            // Klicks deaktivieren
            card.onclick = null;
        });
        lockBoard = true;
    }

    function resetGame() {
        createBoard();
    }

    // Initialisierung
    createBoard();
</script>

</body>
</html>
