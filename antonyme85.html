<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antonyme-Matching: Farblich kodiert</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .instructions {
            background: #fdfdfe;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            text-align: center;
            border: 1px solid #eee;
        }

        .matching-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .word-card {
            background: white;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            color: var(--primary-color);
        }

        .word-card:hover:not(.matched) {
            border-color: var(--accent-color);
            background-color: #f0f8ff;
        }

        .word-card.selected {
            border-color: var(--accent-color);
            background-color: #e1f5fe;
            transform: scale(1.03);
        }

        /* Paar-Farben (Pastell für gute Lesbarkeit) */
        .pair-1 { background-color: #FFADAD !important; border-color: #FF8585 !important; }
        .pair-2 { background-color: #FFD6A5 !important; border-color: #FFB347 !important; }
        .pair-3 { background-color: #FDFFB6 !important; border-color: #E2E600 !important; }
        .pair-4 { background-color: #CAFFBF !important; border-color: #79D700 !important; }
        .pair-5 { background-color: #9BF6FF !important; border-color: #00E1F5 !important; }
        .pair-6 { background-color: #A0C4FF !important; border-color: #4D8BFF !important; }

        .incorrect {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .matched {
            cursor: default;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-sol { background-color: #34495e; }
        .btn-reset { background-color: #95a5a6; }
        button:hover { opacity: 0.9; }

        /* Mobil-Ansicht */
        @media (max-width: 500px) {
            .matching-grid { grid-template-columns: 1fr; gap: 30px; }
            .column::before {
                content: attr(data-label);
                display: block;
                text-align: center;
                font-weight: bold;
                margin-bottom: 10px;
                color: #7f8c8d;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Antonyme-Matching</h1>
    
    <div class="instructions">
        Wähle links ein Verb und rechts sein Gegenteil aus. Korrekte Paare werden farblich markiert.
    </div>

    <div class="matching-grid">
        <div class="column" id="left-col" data-label="Verb"></div>
        <div class="column" id="right-col" data-label="Gegenteil (Antonym)"></div>
    </div>

    <div class="controls">
        <button class="btn-sol" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn-reset" onclick="resetGame()">Neustart</button>
    </div>
</div>

<script>
    const antonymData = [
        { left: "ПОЯВЛЯТЬСЯ", right: "ИСЧЕЗАТЬ", id: 1 },
        { left: "ПОЯВИТЬСЯ", right: "ИСЧЕЗНУТЬ", id: 2 },
        { left: "ПРИБЫВАТЬ", right: "ОТПРАВЛЯТЬСЯ", id: 3 },
        { left: "ПРИБЫТЬ", right: "УБЫТЬ", id: 4 },
        { left: "ПРИХОДИТЬ", right: "УХОДИТЬ", id: 5 },
        { left: "ПРИЕЗЖАТЬ", right: "УЕЗЖАТЬ", id: 6 }
    ];

    let selectedLeft = null;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        const leftCol = document.getElementById('left-col');
        const rightCol = document.getElementById('right-col');
        leftCol.innerHTML = '';
        rightCol.innerHTML = '';
        selectedLeft = null;

        const leftSide = shuffle([...antonymData]);
        const rightSide = shuffle([...antonymData]);

        leftSide.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.textContent = item.left;
            card.dataset.pairId = item.id;
            card.onclick = () => selectLeft(card);
            leftCol.appendChild(card);
        });

        rightSide.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.textContent = item.right;
            card.dataset.pairId = item.id;
            card.onclick = () => selectRight(card);
            rightCol.appendChild(card);
        });
    }

    function selectLeft(card) {
        if (card.classList.contains('matched')) return;
        document.querySelectorAll('#left-col .word-card').forEach(c => c.classList.remove('selected'));
        selectedLeft = card;
        card.classList.add('selected');
    }

    function selectRight(card) {
        if (!selectedLeft || card.classList.contains('matched')) return;

        const pairId = card.dataset.pairId;

        if (selectedLeft.dataset.pairId === pairId) {
            // Richtiges Paar
            selectedLeft.classList.add('matched', 'pair-' + pairId);
            card.classList.add('matched', 'pair-' + pairId);
            selectedLeft.classList.remove('selected');
            selectedLeft = null;
        } else {
            // Falsches Paar
            card.classList.add('incorrect');
            setTimeout(() => {
                card.classList.remove('incorrect');
                if (selectedLeft) selectedLeft.classList.remove('selected');
                selectedLeft = null;
            }, 600);
        }
    }

    function showSolution() {
        const leftCol = document.getElementById('left-col');
        const rightCol = document.getElementById('right-col');
        leftCol.innerHTML = '';
        rightCol.innerHTML = '';

        // Sortiert ausgeben für maximale Übersichtlichkeit
        antonymData.forEach(item => {
            const lc = document.createElement('div');
            lc.className = 'word-card matched pair-' + item.id;
            lc.textContent = item.left;
            leftCol.appendChild(lc);

            const rc = document.createElement('div');
            rc.className = 'word-card matched pair-' + item.id;
            rc.textContent = item.right;
            rightCol.appendChild(rc);
        });
        selectedLeft = null;
    }

    function resetGame() {
        initGame();
    }

    // Start
    initGame();
</script>

</body>
</html>
